<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 Minha Leitura Bíblica</title>
  <style>
    :root { --bg:#0f172a; --card:rgba(30,41,59,0.7); --text:#e2e8f0; --text-muted:#94a3b8; --primary:#10b981; --primary-hover:#059669; --danger:#ef4444; --border:rgba(148,163,184,0.2); --shadow:0 4px 12px rgba(0,0,0,0.3); --radius:12px; }
    @media (prefers-color-scheme: light) { :root { --bg:#f8fafc; --card:rgba(255,255,255,0.9); --text:#1e293b; --text-muted:#64748b; --border:rgba(0,0,0,0.1); --shadow:0 4px 12px rgba(0,0,0,0.1); } }
    * { box-sizing:border-box; margin:0; padding:0; font-family:system-ui,-apple-system,sans-serif; }
    body { background:var(--bg); color:var(--text); min-height:100vh; padding:16px; }
    .container { max-width:600px; margin:0 auto; }
    header { text-align:center; margin-bottom:20px; }
    h1 { font-size:1.6rem; margin-bottom:6px; background:linear-gradient(135deg,var(--primary),#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    #user-id { font-size:0.75rem; color:var(--text-muted); background:var(--card); padding:3px 8px; border-radius:20px; display:inline-block; }
    
    /* Abas */
    .tabs { display:flex; gap:8px; margin-bottom:16px; }
    .tab-btn { flex:1; padding:10px; border:1px solid var(--border); border-radius:var(--radius); background:transparent; color:var(--text-muted); cursor:pointer; font-weight:600; transition:0.2s; }
    .tab-btn.active { background:var(--primary); color:white; border-color:var(--primary); }
    
    /* Progresso */
    .progress-box { background:var(--card); padding:12px; border-radius:var(--radius); margin-bottom:16px; border:1px solid var(--border); }
    .progress-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin-top:6px; }
    .progress-fill { height:100%; background:var(--primary); transition:width 0.4s ease; }
    .progress-text { display:flex; justify-content:space-between; font-size:0.8rem; color:var(--text-muted); }

    /* Plano Oficial */
    #month-selector { width:100%; padding:10px; margin-bottom:12px; background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:8px; font-size:1rem; }
    .plan-list { display:flex; flex-direction:column; gap:8px; max-height:60vh; overflow-y:auto; }
    .plan-day { background:var(--card); padding:10px 14px; border-radius:8px; border:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    .plan-day.done { opacity:0.6; border-color:var(--primary); }
    .plan-day.done .day-text { text-decoration:line-through; }
    .day-check { width:24px; height:24px; border-radius:50%; border:2px solid var(--border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; }
    .day-check.checked { background:var(--primary); border-color:var(--primary); color:white; }
    .day-text { flex:1; }
    .day-label { font-size:0.75rem; color:var(--text-muted); }

    /* Leitura Livre */
    .btn { width:100%; padding:12px; border:none; border-radius:var(--radius); background:var(--primary); color:white; font-size:1rem; font-weight:600; cursor:pointer; margin-bottom:16px; }
    .btn:hover { background:var(--primary-hover); }
    .readings-list { display:flex; flex-direction:column; gap:10px; }
    .free-card { background:var(--card); padding:12px; border-radius:8px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .free-info h4 { font-size:1rem; margin-bottom:2px; }
    .free-info p { font-size:0.8rem; color:var(--text-muted); }
    .icon-btn { width:30px; height:30px; border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.1); color:var(--text); transition:0.2s; }
    .icon-btn.delete:hover { background:var(--danger); color:white; }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:0.3s; z-index:100; }
    .modal-overlay.open { opacity:1; pointer-events:auto; }
    .modal { background:var(--bg); width:100%; max-width:500px; padding:20px; border-radius:20px 20px 0 0; transform:translateY(100%); transition:0.3s; }
    .modal-overlay.open .modal { transform:translateY(0); }
    .form-group { margin-bottom:12px; }
    .form-group label { display:block; margin-bottom:4px; font-size:0.85rem; color:var(--text-muted); }
    .form-group input { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; background:var(--card); color:var(--text); }
    .modal-actions { display:flex; gap:8px; margin-top:12px; }
    .btn-sec { background:var(--card); color:var(--text); }

    #loading { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:200; }
    .spinner { width:40px; height:40px; border:4px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#334155; color:white; padding:10px 16px; border-radius:30px; font-size:0.85rem; opacity:0; transition:0.3s; z-index:300; }
    .toast.show { opacity:1; bottom:40px; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div></div>
  <div class="toast" id="toast"></div>

  <div class="container">
    <header>
      <h1>📖 Minha Leitura Bíblica</h1>
      <div id="user-id">Conectando...</div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('plano')">📅 Plano Oficial</button>
      <button class="tab-btn" onclick="switchTab('livre')">📖 Leitura Livre</button>
    </div>

    <!-- ABA PLANO -->
    <div id="tab-plano">
      <div class="progress-box">
        <div class="progress-text"><span id="month-label">Janeiro</span><span id="month-pct">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="month-bar"></div></div>
      </div>
      <select id="month-selector"></select>
      <div class="plan-list" id="plan-container">
        <p style="text-align:center;color:var(--text-muted);">Carregando plano...</p>
      </div>
    </div>

    <!-- ABA LIVRE -->
    <div id="tab-livre" style="display:none;">
      <button class="btn" onclick="openFreeModal()">➕ Registrar Leitura</button>
      <div class="readings-list" id="free-container">
        <p style="text-align:center;color:var(--text-muted);">Nenhuma leitura registrada.</p>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>📖 Nova Leitura</h3>
      <form id="free-form">
        <div class="form-group"><label>Livro</label><input type="text" id="f-book" required placeholder="Ex: Salmos, João"></div>
        <div class="form-group"><label>Capítulos</label><input type="text" id="f-caps" required placeholder="Ex: 23, 1-5"></div>
        <div class="form-group"><label>Data</label><input type="date" id="f-date" required></div>
        <div class="modal-actions"><button type="button" class="btn btn-sec" onclick="closeModal()">Cancelar</button><button type="submit" class="btn">Salvar</button></div>
      </form>
    </div>
  </div>

  <script type="module">
    // 🔥 1. IMPORTAÇÕES FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔑 2. COLE SUAS CHAVES AQUI (substitua os valores entre aspas)
    const firebaseConfig = {

  apiKey: "AIzaSyA3dEalK97ToeFQ0Mk8TEJZjyvshiBZ7e8",

  authDomain: "leitura-biblica-dramatizadaapp.firebaseapp.com",

  projectId: "leitura-biblica-dramatizadaapp",

  storageBucket: "leitura-biblica-dramatizadaapp.firebasestorage.app",

  messagingSenderId: "945032968154",

  appId: "1:945032968154:web:beae417cb27a87547bf2e3"

};



    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 📖 3. DADOS DO PLANO (Aqui entra sua planilha completa)
    const PLAN_DATA = {
      "Janeiro": [
        {dia:1, livro:"Gênesis", caps:"1-3"}, {dia:2, livro:"Gênesis", caps:"4-7"}, {dia:3, livro:"Gênesis", caps:"8-11"},
        {dia:4, livro:"Gênesis", caps:"12-14"}, {dia:5, livro:"Gênesis", caps:"15-17"}, {dia:6, livro:"Gênesis", caps:"18-20"},
        {dia:7, livro:"Gênesis", caps:"21-23"}, {dia:8, livro:"Gênesis", caps:"24"}, {dia:9, livro:"Gênesis", caps:"25-26"},
        {dia:10, livro:"Gênesis", caps:"27-29"}, {dia:11, livro:"Gênesis", caps:"30-32"}, {dia:12, livro:"Gênesis", caps:"33-36"},
        {dia:13, livro:"Gênesis", caps:"37-39"}, {dia:14, livro:"Gênesis", caps:"40-42"}, {dia:15, livro:"Gênesis", caps:"43-46"},
        {dia:16, livro:"Gênesis", caps:"47-50"}, {dia:17, livro:"Êxodo", caps:"1-4"}, {dia:18, livro:"Êxodo", caps:"5-8"},
        {dia:19, livro:"Êxodo", caps:"9-12"}, {dia:20, livro:"Êxodo", caps:"13-15"}, {dia:21, livro:"Êxodo", caps:"16-18"},
        {dia:22, livro:"Êxodo", caps:"19-22"}, {dia:23, livro:"Êxodo", caps:"23-26"}, {dia:24, livro:"Êxodo", caps:"27-30"},
        {dia:25, livro:"Êxodo", caps:"31-34"}, {dia:26, livro:"Êxodo", caps:"35-37"}, {dia:27, livro:"Êxodo", caps:"38-40"},
        {dia:28, livro:"Levítico", caps:"1-5"}, {dia:29, livro:"Levítico", caps:"6-10"}, {dia:30, livro:"Levítico", caps:"11-15"},
        {dia:31, livro:"Levítico", caps:"16-20"}
      ],
      "Fevereiro": [
        {dia:1, livro:"Levítico", caps:"21-27"}, {dia:2, livro:"Números", caps:"1-4"}, {dia:3, livro:"Números", caps:"5-7"},
        {dia:4, livro:"Números", caps:"8-12"}, {dia:5, livro:"Números", caps:"13-16"}, {dia:6, livro:"Números", caps:"17-20"},
        {dia:7, livro:"Números", caps:"21-25"}, {dia:8, livro:"Números", caps:"26-30"}, {dia:9, livro:"Números", caps:"31-33"},
        {dia:10, livro:"Números", caps:"34-36"}, {dia:11, livro:"Deuteronômio", caps:"1-4"}, {dia:12, livro:"Deuteronômio", caps:"5-8"},
        {dia:13, livro:"Deuteronômio", caps:"9-12"}, {dia:14, livro:"Deuteronômio", caps:"13-16"}, {dia:15, livro:"Deuteronômio", caps:"17-20"},
        {dia:16, livro:"Deuteronômio", caps:"21-25"}, {dia:17, livro:"Deuteronômio", caps:"26-30"}, {dia:18, livro:"Deuteronômio", caps:"31-34"},
        {dia:19, livro:"Josué", caps:"1-4"}, {dia:20, livro:"Josué", caps:"5-8"}, {dia:21, livro:"Josué", caps:"9-12"},
        {dia:22, livro:"Josué", caps:"13-16"}, {dia:23, livro:"Josué", caps:"17-21"}, {dia:24, livro:"Josué", caps:"22-24"},
        {dia:25, livro:"Juízes", caps:"1-5"}, {dia:26, livro:"Juízes", caps:"6-10"}, {dia:27, livro:"Juízes", caps:"11-16"},
        {dia:28, livro:"Juízes", caps:"17-21; Rute 1-4"}
      ],
      // ... ADICIONE OS OUTROS MESES AQUI SEGUINDO O MESMO PADRÃO ...
      "Março": [{dia:1, livro:"1 Samuel", caps:"1-5"}],
      "Abril": [{dia:1, livro:"2 Crônicas", caps:"10-14"}],
      "Maio": [{dia:1, livro:"Isaías", caps:"1-5"}],
      "Junho": [{dia:1, livro:"Jeremias", caps:"1-5"}],
      "Julho": [{dia:1, livro:"Mateus", caps:"1-4"}],
      "Agosto": [{dia:1, livro:"Atos", caps:"16-20"}],
      "Setembro": [{dia:1, livro:"Apocalipse", caps:"1-4"}],
      "Outubro": [{dia:1, livro:"Revisão", caps:"Pentateuco"}],
      "Novembro": [{dia:1, livro:"Revisão", caps:"Profetas"}],
      "Dezembro": [{dia:1, livro:"Revisão", caps:"Novo Testamento"}]
    };

    let currentUserId = null;
    let planProgress = {};
    let freeReadings = [];
    let currentMonth = "Janeiro";

    // 🔐 4. AUTENTICAÇÃO
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUserId = user.uid;
        document.getElementById('user-id').textContent = `ID: ${user.uid.substring(0, 6)}...`;
        document.getElementById('loading').style.display = 'none';
        initApp();
      } else { signInAnonymously(auth); }
    });

    function initApp() {
      setupMonthSelector();
      loadPlanProgress();
      loadFreeReadings();
      renderPlan();
    }

    // 🗓️ SELETOR DE MESES
    function setupMonthSelector() {
      const sel = document.getElementById('month-selector');
      Object.keys(PLAN_DATA).forEach(m => {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', (e) => { currentMonth = e.target.value; renderPlan(); });
    }

    // 💾 CARREGAR PROGRESSO DO PLANO
    function loadPlanProgress() {
      onSnapshot(doc(db, `users/${currentUserId}/planProgress`), (snap) => {
        planProgress = snap.exists() ? snap.data() : {};
        renderPlan();
      });
    }

    // 🎨 RENDERIZAR PLANO
    function renderPlan() {
      const container = document.getElementById('plan-container');
      const data = PLAN_DATA[currentMonth] || [];
      let completed = 0;

      container.innerHTML = data.map(day => {
        const key = `${currentMonth}-${day.dia}`;
        const done = !!planProgress[key];
        if (done) completed++;
        return `
          <div class="plan-day ${done?'done':''}">
            <button class="day-check ${done?'checked':''}" onclick="togglePlanDay('${key}')">${done?'✓':''}</button>
            <div class="day-text">
              <div class="day-label">Dia ${day.dia}</div>
              <div class="day-content">${day.livro} • Cap. ${day.caps}</div>
            </div>
          </div>`;
      }).join('');

      // Atualizar barra de progresso
      const pct = data.length ? Math.round((completed / data.length) * 100) : 0;
      document.getElementById('month-label').textContent = currentMonth;
      document.getElementById('month-pct').textContent = `${pct}%`;
      document.getElementById('month-bar').style.width = `${pct}%`;
    }

    // ✅ MARCAR/DESMARCAR DIA
    window.togglePlanDay = async (key) => {
      const newVal = !planProgress[key];
      planProgress[key] = newVal;
      await setDoc(doc(db, `users/${currentUserId}/planProgress`), { [key]: newVal }, { merge: true });
      showToast(newVal ? '✅ Marcado como lido!' : '↩️ Desmarcado');
    };

    // 📖 LEITURAS LIVRES
    function loadFreeReadings() {
      const q = query(collection(db, `users/${currentUserId}/readings`), orderBy('date', 'desc'));
      onSnapshot(q, (snap) => {
        freeReadings = snap.docs.map(d => ({id:d.id, ...d.data()}));
        renderFreeReadings();
      });
    }

    function renderFreeReadings() {
      const container = document.getElementById('free-container');
      if (freeReadings.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-muted);">Nenhuma leitura registrada.</p>';
        return;
      }
      container.innerHTML = freeReadings.map(r => `
        <div class="free-card">
          <div class="free-info"><h4>${r.book}</h4><p>📖 Cap. ${r.chapters} | 📅 ${formatDate(r.date)}</p></div>
          <button class="icon-btn delete" onclick="deleteFree('${r.id}')">🗑️</button>
        </div>`).join('');
    }

    window.deleteFree = async (id) => {
      if(confirm('Excluir esta leitura?')) {
        await deleteDoc(doc(db, `users/${currentUserId}/readings/${id}`));
        showToast('🗑️ Removida');
      }
    };

    // 📝 FORMULÁRIO LIVRE
    document.getElementById('free-form').onsubmit = async (e) => {
      e.preventDefault();
      await addDoc(collection(db, `users/${currentUserId}/readings`), {
        book: document.getElementById('f-book').value.trim(),
        chapters: document.getElementById('f-caps').value.trim(),
        date: document.getElementById('f-date').value,
        createdAt: serverTimestamp()
      });
      closeModal(); e.target.reset();
      showToast('📖 Leitura registrada!');
    };

    // 🧩 UTILITÁRIOS
    function formatDate(d) { if(!d) return '-'; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
    window.switchTab = (tab) => {
      document.getElementById('tab-plano').style.display = tab==='plano'?'block':'none';
      document.getElementById('tab-livre').style.display = tab==='livre'?'block':'none';
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(tab==='plano'?'Plano':'Livre')));
    };
    window.openFreeModal = () => {
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('modal').classList.add('open');
    };
    window.closeModal = () => document.getElementById('modal').classList.remove('open');
    document.getElementById('modal').onclick = (e) => { if(e.target===e.currentTarget) closeModal(); };
    window.showToast = (msg) => { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); };
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  </script>
</body>
</html>
